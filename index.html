<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS OBD2 - Sistema de Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            background-color: #080d14;
        }

        /* Video de fondo esfumado / difuminado */
        .video-fondo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: blur(10px) brightness(0.35); /* Desenfoque y oscurecimiento */
            transform: scale(1.1); /* Evita bordes vacíos por el filtro */
        }

        /* Capa de contraste */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 20, 30, 0.5);
            z-index: -1;
        }

        /* Tarjeta central elegante */
        .card {
            background: rgba(15, 25, 38, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px 25px;
            border-radius: 20px;
            border: 1px solid rgba(0, 230, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            max-width: 420px;
            width: 90%;
        }

        .img-dispositivo {
            width: 140px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,230,255,0.2);
        }

        h1 {
            font-size: 22px;
            margin-bottom: 10px;
            color: #00e6ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            font-size: 14px;
            color: #d1d5db;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .btn-tracking {
            display: inline-block;
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, #00e6ff, #0055ff);
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 230, 255, 0.4);
            transition: all 0.3s ease;
        }

        .btn-tracking:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 230, 255, 0.7);
        }

        .status {
            margin-top: 20px;
            font-size: 12px;
            color: #00ff88;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ff88;
        }
    </style>
</head>
<body>

    <!-- Video de fondo de la instalación -->
    <video autoPlay loop muted playsInline class="video-fondo">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="card">
        <!-- Foto del equipo OBD2 en el centro -->
        <img src="foto-obd.JPG" alt="GPS OBD2" class="img-dispositivo">
        
        <h1>VEHICULO CONTROLADO </h1>
        <p>Monitoreo de flotas y vehículos en tiempo real  2 años de saldo, chip y acceso a la plataforma.</p>

        <!-- Botón que redirige a la plataforma -->
        <a href="http://www.gpsdd.net" class="btn-tracking" target="_blank">
            INGRESAR A LA PLATAFORMA
        </a>

        <div class="status">
            <span class="dot"></span> 
        </div>
    </div>

</body>
</html>
