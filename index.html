<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- VIEWPORT FIJO MODO ESCRITORIO (Ancho rígido para celulares) -->
    <meta name="viewport" content="width=1280, initial-scale=0.3, maximum-scale=3.0, user-scalable=yes">
    <title>Rastreo GPS OBD2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* FONDO BASE CON LA IMAGEN AJUSTADA */
        body {
            min-height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #0f172a url('foto-obd.jpg') no-repeat center center fixed;
            background-size: contain;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 60px;
            position: relative;
        }

        /* CONTENEDOR FLOTANTE PRINCIPAL */
        .left-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(10, 15, 25, 0.70);
            padding: 24px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            min-width: 280px;
        }

        /* ESTILO GENERAL DE LOS BOTONES DEL PANEL */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            text-align: center;
            cursor: pointer;
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        /* BOTÓN 1: INGRESO A PLATAFORMA */
        .btn-main {
            background: linear-gradient(135deg, #00e6ff, #0055ff);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(0, 230, 255, 0.3);
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(0, 230, 255, 0.6);
        }

        /* BOTÓN 2: COMPRAR EQUIPOS POR WHATSAPP */
        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .btn-secondary:hover {
            background: rgba(37, 211, 102, 0.25);
            border-color: #25D366;
            transform: translateY(-2px);
        }

        /* BOTÓN 3: COMPRAR EQUIPOS POR MERCADOLIBRE */
        .btn-mercadolibre {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .btn-mercadolibre:hover {
            background: rgba(255, 230, 0, 0.25);
            border-color: #ffe600;
            transform: translateY(-2px);
        }

        /* BOTÓN CHICO DE VIDEO */
        .btn-video-toggle {
            position: fixed;
            bottom: 35px;
            right: 17.5%;
            z-index: 20;
            background: rgba(15, 23, 42, 0.85);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .btn-video-toggle:hover {
            background: rgba(0, 230, 255, 0.2);
            border-color: #00e6ff;
            transform: scale(1.05);
        }

        /* VIDEO FLOTANTE CENTRADO SOBRE EL BOTÓN */
        .bg-video {
            position: fixed;
            bottom: 80px;
            right: 17.5%;
            width: 320px;
            height: 180px;
            object-fit: cover;
            z-index: 20;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            opacity: 0;
            visibility: hidden;
            transform: translateX(calc(50% - 75px)); 
            transition: opacity 0.4s ease, visibility 0.4s ease, transform 0.4s ease;
        }

        /* CLASE PARA MOSTRAR EL VIDEO */
        .bg-video.active {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

    <!-- PANEL PRINCIPAL -->
    <div class="left-container">
        <!-- BOTÓN 1: INGRESO A PLATAFORMA -->
        <a href="http://www.gpsdd.net" class="btn btn-main" target="_blank" rel="noopener noreferrer">

            <svg class="btn-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">

            </svg>

    </div>

    <!-- REPRODUCTOR DE VIDEO FLOTANTE -->
    <video id="bgVideo" class="bg-video" loop playsinline controls>
        <source src="fondo.mp4" type="video/mp4">
        Tu navegador no soporta videos HTML5.
    </video>

    <!-- BOTÓN CHICO DE CONTROL -->
    <button id="videoBtn" class="btn-video-toggle">
        ▶ Reproducir Video
    </button>

    <script>
        const video = document.getElementById('bgVideo');
        const videoBtn = document.getElementById('videoBtn');

        videoBtn.addEventListener('click', () => {
            if (video.paused) {
                video.play();
                video.classList.add('active');
                videoBtn.innerHTML = '✕ Cerrar / Pausar Video';
            } else {
                video.pause();
                video.classList.remove('active');
                videoBtn.innerHTML = '▶ Reproducir Video';
            }
        });
    </script>
</body>
</html>
